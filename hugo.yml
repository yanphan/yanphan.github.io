baseURL: "https://yanphan.github.io/"
title: Yan'Codex
paginate: 3
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Yan'Codex
  description: "This website documents my learning journey as a student since 2026"
  keywords: [Blog, Portfolio, PaperMod] 
  author: Yan Phan
  images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  ShowToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "/android-chrome-192x192.png"
    favicon16x16: "/android-chrome-192x192.png"
    favicon32x32: "/android-chrome-192x192.png"
    apple_touch_icon: "/android-chrome-192x192.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"

  label:
    text: "Yan'Codex"
    icon: /android-chrome-192x192.png
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: false
    title: Yan'Codex
    subtitle: "This website documents my learning journey as a student since 2026"
    imageUrl: "<img location>"
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags

  # home-info mode
  homeInfoParams:
    Title: "Welcome to Yan'Codex"
    Content: Hi, I'm Yan Phan. This website documents my learning journey as a student since 2026. Because I'm studying while writing, there may be mistakes, so please bear with me. Also, Gemini has helped me a lot😉.

  socialIcons:
    - name: kofi
      url: "https://ko-fi.com/yanphan"
    - name: email
      url: "yanphan.dev@gmail.com"
    - name: github
      url: "https://github.com/yanphan"

  analytics:
    google:
      SiteVerificationTag: "XYZabc"
    bing:
      SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "XYZabc"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  editPost:
    URL: "https://github.com/<path_to_repo>/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: home
      name: Posts
      url: /
      weight: 10
    - identifier: archive
      name: Archive
      url: /archives/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 40
    - identifier: faq
      name: FAQ
      url: /faq/
      weight: 50
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai

outputs:
  home:
    - HTML
    - RSS
    - JSON